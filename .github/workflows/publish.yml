name: publish

# Cuts a release: on a version tag, gate on a green build + full test suite (including the
# public-API lock), then pack and push to nuget.org and open a GitHub release. Nothing
# publishes on an ordinary push — only when a v<MAJOR>.<MINOR>.<PATCH> tag is pushed, and
# only if that tag matches <Version> in Directory.Build.props (see docs/versioning.md).
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create the GitHub release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Verify tag matches <Version>
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          version="$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props)"
          echo "tag=$tag  <Version>=$version"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag v$tag does not match <Version>$version in Directory.Build.props — bump the version in the same commit as the tag (docs/versioning.md)."
            exit 1
          fi

      - name: Restore
        run: dotnet restore

      - name: Build (warnings are errors)
        run: dotnet build -c Release --no-restore

      - name: Test (incl. public-API lock)
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/M0LTE.Flex/M0LTE.Flex.csproj -c Release --no-build -o artifacts

      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "::error::NUGET_API_KEY secret is not set — add it in the repo settings (Settings ▸ Secrets and variables ▸ Actions) or with 'gh secret set NUGET_API_KEY'."
            exit 1
          fi
          dotnet nuget push "artifacts/*.nupkg"  --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "artifacts/*.snupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/*.nupkg --title "$GITHUB_REF_NAME" --generate-notes
