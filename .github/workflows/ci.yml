name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    # A public repo gets free GitHub-hosted minutes; the build needs only the .NET SDK.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build (warnings are errors)
        run: dotnet build -c Release --no-restore

      # Runs the whole suite, including PublicApiTests — the public-API lock. Any
      # unintended change to the public surface fails here (see docs/versioning.md).
      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack -c Release --no-build -o artifacts

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
